specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Adapt
providerId: adapt-io
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - B2B Data
  - Credits
description: >-
  FOCUS-aligned FinOps definition for Adapt's Prospect API. Credit-based metering
  across four lanes — email, phone, enrichment, and search — drawn against plan
  allotments with overage handled by plan upgrade rather than usage-based overage.
sources:
  - https://www.adapt.io/pricing
  - https://www.adapt.io/api-docs/v3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Adapt
serviceCategory: Data and Analytics
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
  primaryUnit: credit
  secondaryUnits:
    - contact
    - search
    - request
focusColumns:
  ServiceName: Adapt Prospect API
  ServiceCategory: Data and Analytics
  ProviderName: Adapt
  PublisherName: Adapt
  InvoiceIssuerName: Adapt
  PricingCategory: Subscription
  PricingUnit: credit
  BillingCurrency: USD
meters:
  - name: email_credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - account
      - operation
    sourceHeader: email-remaining-credits
    description: Email credits consumed by POST /contact/fetch when revealing verified emails.
  - name: phone_credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - account
      - operation
    sourceHeader: phone-remaining-credits
    description: Phone credits consumed by POST /contact/fetch when revealing phone numbers.
  - name: enrichment_credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - account
      - operation
    sourceHeader: enrich-remaining-credits
    description: Enrichment credits consumed by POST /contact/enrich.
  - name: search_credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - account
      - operation
    sourceHeader: search-remaining-credits
    description: Search credits consumed by POST /contact/search and POST /company/search.
  - name: requests
    unit: request
    aggregation: sum
    dimensions:
      - account
      - operation
    description: Raw HTTP request count, governed by the 250 rpm rate limit.
allocationDimensions:
  - account
  - operation
  - team
  - campaign
budgeting:
  forecastMethod: credit-burn-rate
  alertThresholds:
    - level: warning
      remainingPercent: 25
    - level: critical
      remainingPercent: 10
  recommendedPractices:
    - Tag downstream API calls with a campaign or team identifier to enable showback.
    - Cap searches with cursorMark page sizes to avoid silent credit burn.
    - Pull credit-remaining response headers into a usage warehouse on every call.
    - Reconcile monthly invoice against credit-burn telemetry to validate Adapt billing.
