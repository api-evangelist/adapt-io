apis:
  - aid: adapt-io:adapt-prospect-api
    name: Adapt Prospect API
    description: >-
      REST API for searching Adapt's B2B contact and company database, enriching known contacts by
      email/LinkedIn/name+domain, and purchasing contacts to reveal verified email addresses and phone numbers. JSON
      over HTTPS with header-based authentication (email + apiKey). Default rate limit of 250 requests per minute per
      account; pagination via cursorMark; credit consumption surfaced through `x-call-credit-type` and
      `*-remaining-credits` response headers.
    humanURL: https://www.adapt.io/api-docs/v3/
