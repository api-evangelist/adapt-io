aid: adapt-io
name: Adapt
description: >-
  Adapt (adapt.io) is a B2B lead intelligence and sales acceleration platform that provides a database of 250M+ verified
  business contacts, 16M+ decision makers, and 12M+ company profiles, refreshed at roughly 5M records per day. Adapt
  sells the data three ways — through a web Prospector for list building and ABM, a LinkedIn/website Chrome extension
  for in-context contact discovery, and a public REST API for programmatic search, enrichment, and contact purchase. The
  Prospect API exposes four operations (contact search, company search, contact enrichment, and contact purchase /
  fetch) with 50+ firmographic, technographic, and demographic attributes per record, header- based authentication via
  account email + API key, and a 250 requests-per- minute rate limit. Pricing is published for self-serve Free, Starter
  ($49/mo) and Basic ($99/mo) tiers; API access is gated to the custom enterprise plan with negotiated email, phone, and
  enrichment credit allotments. Adapt is primarily used by sales, marketing, and RevOps teams for outbound campaigns,
  CRM enrichment, lead scoring, ICP list building, and data hygiene, with CRM exports to Salesforce, HubSpot, Pipedrive,
  Zoho, Outreach, and Salesgear.
