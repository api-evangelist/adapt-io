naftiko: 1.0.0-alpha2
info:
  label: Adapt Prospect API — Contact Purchase
  description: >-
    Adapt Prospect API — Contact Purchase. 1 operation. Lead operation: Adapt Purchase Contacts.
    Self-contained Naftiko capability covering one Adapt business surface.
  tags:
    - Adapt
    - Contacts
    - Purchase
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      ADAPT_EMAIL: ADAPT_EMAIL
      ADAPT_API_KEY: ADAPT_API_KEY
capability:
  consumes:
    - type: http
      namespace: prospect-purchase
      baseUri: https://api.adapt.io/v3
      description: >-
        Adapt Prospect API — Contact Purchase business capability. Reveals verified emails and
        phone numbers for contactIds returned from search (max 50 per request).
      resources:
        - name: contact-fetch
          path: /contact/fetch
          operations:
            - name: purchasecontacts
              method: POST
              description: Adapt Purchase Contacts
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Purchase request body — { "contactIds": [...] } with max 50 ids.
                  required: true
      authentication:
        type: composite
        headers:
          email: '{{env.ADAPT_EMAIL}}'
          apiKey: '{{env.ADAPT_API_KEY}}'
  exposes:
    - type: rest
      namespace: prospect-purchase-rest
      port: 8080
      description: REST adapter for Adapt Prospect API — Contact Purchase.
      resources:
        - path: /v3/contact/fetch
          name: contact-fetch
          description: REST surface for purchasing contacts.
          operations:
            - method: POST
              name: purchasecontacts
              description: Adapt Purchase Contacts
              call: prospect-purchase.purchasecontacts
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: prospect-purchase-mcp
      port: 9090
      transport: http
      description: MCP adapter for Adapt Prospect API — Contact Purchase.
      tools:
        - name: adapt-purchase-contacts
          description: Adapt Purchase Contacts
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: prospect-purchase.purchasecontacts
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
