naftiko: 1.0.0-alpha2
info:
  label: Adapt Prospect API — Contact Search
  description: >-
    Adapt Prospect API — Contact Search. 1 operation. Lead operation: Adapt Search Contacts.
    Self-contained Naftiko capability covering one Adapt business surface.
  tags:
    - Adapt
    - Contacts
    - Search
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      ADAPT_EMAIL: ADAPT_EMAIL
      ADAPT_API_KEY: ADAPT_API_KEY
capability:
  consumes:
    - type: http
      namespace: prospect-contact-search
      baseUri: https://api.adapt.io/v3
      description: Adapt Prospect API — Contact Search business capability. Self-contained, no shared references.
      resources:
        - name: contact-search
          path: /contact/search
          operations:
            - name: searchcontacts
              method: POST
              description: Adapt Search Contacts
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Contact search request body (JSON).
                  required: true
      authentication:
        type: composite
        headers:
          email: '{{env.ADAPT_EMAIL}}'
          apiKey: '{{env.ADAPT_API_KEY}}'
  exposes:
    - type: rest
      namespace: prospect-contact-search-rest
      port: 8080
      description: REST adapter for Adapt Prospect API — Contact Search.
      resources:
        - path: /v3/contact/search
          name: contact-search
          description: REST surface for contact search.
          operations:
            - method: POST
              name: searchcontacts
              description: Adapt Search Contacts
              call: prospect-contact-search.searchcontacts
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: prospect-contact-search-mcp
      port: 9090
      transport: http
      description: MCP adapter for Adapt Prospect API — Contact Search.
      tools:
        - name: adapt-search-contacts
          description: Adapt Search Contacts
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: prospect-contact-search.searchcontacts
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
